<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals</title>
    <link rel="stylesheet" href="./css/styleGoals.css">
</head>
<body>

    <div class="app-container">
        <header class="goals-header">
            <a href="settings.html" class="back-btn" style="text-decoration: none; color: black; font-size: 24px;">&#10094;</a>
            <h1>Goals</h1>
        </header>

        <hr class="header-divider">

        <main class="goals-main">
            <div class="app-card">
                <h3 style="margin-bottom: 20px;">Set Your Goals</h3>
                
                <label class="edit-label">Daily Steps Goal</label>
                <div class="input-row">
                    <input type="number" class="edit-input" placeholder="10,000" value="10000">
                    <span class="unit">steps</span>
                </div>

                <label class="edit-label">Daily Calories Goal</label>
                <div class="input-row">
                <input type="number" class="edit-input" placeholder="600" value="600">                    <span class="unit">kcal</span>
                </div>

                <div class="button-group">
                    <button class="secondary-btn">Cancel</button>
                    <button class="confirm-btn">Save</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="home.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
            <a href="settings.html" class="nav-item active">
                <span class="nav-icon">⚙️</span>
                <span>Settings</span>
            </a>
        </nav>
    </div>
    <script src="./js/scriptGoals.js"></script>
</body>
</html>
