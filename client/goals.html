<div class="app-container">
    <header class="goals-header">
        <a href="settings.html" class="back-btn">&#10094;</a>
        <h1>Goals</h1>
    </header>

    <main class="goals-main">
        <div class="app-card">
            <h3>Set Your Goals</h3>
            
            <label class="edit-label">Daily Steps Goal</label>
            <input type="number" class="edit-input" placeholder="10,000" value="10,000">
            <span class="unit">steps</span>

            <label class="edit-label">Weekly Distance Goal</label>
            <input type="number" class="edit-input" placeholder="25" value="25">
            <span class="unit">km</span>

            <div class="button-group">
                <button class="secondary-btn">Cancel</button>
                <button class="confirm-btn">Save</button>
            </div>
        </div>
    </main>

    </div>
