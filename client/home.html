<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracking App</title>
    <link rel="stylesheet" href="./css/styleHome.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div class="app-container">

        <header class="top-header">
            <div class="greeting-area">
                <h1>Good Morning</h1>
                <p class="date" id="current-date"></p>
            </div>
            <div class="profile-icon">
                <img src="./images/icon.png" alt="Profile">
            </div>
        </header>

        <main>
<section class="data-summary">
    <h2>Daily Summary</h2>
    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-top">
                <div class="stat-left">
                    <span class="icon">👣</span>
                    <div class="stat-info">
                        <span class="stat-title">Steps</span>
                        <span class="stat-value" id="daily-steps">0</span>
                    </div>
                </div>
                <div class="stat-right"><span class="stat-goal" id="homeStepsGoal">Goal: 10,000</span></div>            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-steps" style="width: 0%;"></div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-top">
                <div class="stat-left">
                    <span class="icon">🔥</span>
                    <div class="stat-info">
                        <span class="stat-title">Calories</span>
                        <span class="stat-value" id="daily-calories">0</span>
                    </div>
                </div>
<div class="stat-right"><span class="stat-goal" id="homeCaloriesGoal">Goal: 600</span></div>            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-calories" style="width: 0%;"></div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-top">
                <div class="stat-left">
                    <span class="icon">⏱️</span>
                    <div class="stat-info">
                        <span class="stat-title">Active Time</span>
                        <span class="stat-value" id="daily-time">0 <span class="unit">min</span></span>
                    </div>
                </div>
                <div class="stat-right"><span class="stat-goal">Goal: 60 min</span></div>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-time" style="width: 0%;"></div>
            </div>
        </div>
    </div>
</section>

            <button class="primary-btn start-workout" onclick="window.location.href='workouts.html'">
                <img src="./images/icon.png" alt="Pulse" class="btn-icon"> Start Workout
            </button>

            <section class="weekly-progress-card">
                
                <div class="weekly-header">
                    <span class="trend-icon">📈</span>
                    <h2>Weekly Progress</h2>
                </div>
                
                <div class="progress-details">
                    <div class="progress-row">
                        <span class="row-label">Workouts Completed</span>
                        <span class="row-value" id="weekly-workouts">0</span> </div>
                    <div class="progress-row">
                        <span class="row-label">Total Distance</span>
                        <span class="row-value" id="weekly-distance">0 km</span> </div>
                    <div class="progress-row">
                        <span class="row-label">Calories Burned</span>
                        <span class="row-value" id="weekly-calories">0 kcal</span> </div>
                </div>
                
                <button class="secondary-btn" onclick="window.location.href='analytics.html'">View Full Analytics</button>
                
            </section>

            <section class="weekly-progress-card" style="margin-top: 20px;">
                <div class="weekly-header">
                    <span class="trend-icon">📍</span>
                    <h2>Recommended Trails</h2>
                </div>
                <div id="map-wrapper" class="home-map-wrapper">
                <div id="map" class="home-map-render"></div>
                    <button id="expandMapBtn" class="expand-btn">⛶</button>
                </div>
            </section>
            
        </main>

        <button id="closeMapBtn" class="close-map-btn" style="display: none;">‹ Close</button>
        <button id="randomRouteBtn" class="random-route-btn" style="display: none;">🎲 Random Route</button>

        <nav class="bottom-nav">
            <a href="home.html" class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span>Settings</span>
            </a>
        </nav>

    </div>

    <script src="./js/scriptHome.js"></script>
</body>
</html>
