<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Fitness Tracking App</title>
    <link rel="stylesheet" href="./css/styleRegister.css">
</head>
<body>

    <div class="login-container">
        
        <div class="header-section">
            <div class="logo-icon">
                <img src="./images/icon.png" alt="Fitness Logo" style="width: 45px; height: 45px; object-fit: contain;">
            </div>
            <h1>Sign Up</h1>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                <span class="error-message" id="nameError"></span>
            </div>

            <div class="input-group">
                <label for="birthDate">Birth Date</label>
                <input type="date" id="birthDate" name="birthDate">
                <span class="error-message" id="dateError"></span>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password">
                <span class="error-message" id="passwordError"></span>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password">
                <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <div id="registerMessage" class="server-message"></div>
            <button type="submit" class="primary-btn">Sign Up</button>
        </form>

        <div class="footer-links">
            <p>Already have an account? <a href="index.html" class="register-link">Login</a></p>
        </div>
    </div>

    <script src="./js/scriptRegister.js"></script>
</body>
</html>
